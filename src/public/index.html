<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-CAM Proxy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎥 ESP32-CAM Stream Proxy</h1>
        <p>Stream MJPEG en tiempo real desde tu ESP32-CAM</p>

        <img id="stream-img" src="/stream" alt="ESP32-CAM Stream">

        <div class="info">
            <p><strong>Estado:</strong> <span id="status">Conectado</span></p>
            <p><strong>Puerto:</strong> 3001</p>
            <p><strong>Endpoint:</strong> /stream</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
